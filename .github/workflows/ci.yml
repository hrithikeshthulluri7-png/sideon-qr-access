name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qr-access-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: qr-access-backend/package-lock.json
      - run: npm ci
      - run: npm test -- --forceExit --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: qr-access-backend/coverage/
