# ===============================================
# Docker Compose for local production-like testing
# ===============================================

version: '3.8'

services:
  sideon-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sideon-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      HOST: ${HOST:-0.0.0.0}
      # Override with production values
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-1h}
      EXPIRATION_MINUTES: ${EXPIRATION_MINUTES:-60}
      DATABASE_URL: /app/data/sideon.db
      DATABASE_BACKUP_DIR: /app/data/backups
      DATABASE_BACKUP_RETENTION_DAYS: ${DATABASE_BACKUP_RETENTION_DAYS:-30}
      LOG_DIR: /app/logs
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:8000,http://localhost:3000}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VERSION: ${VERSION:-1.0.0}
    volumes:
      # Persist database across restarts
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - sideon-network

  sideon-frontend:
    image: nginx:alpine
    container_name: sideon-frontend
    ports:
      - "8080:80"
    volumes:
      - ../sideon-qr-web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      sideon-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ && wget -q --spider http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - sideon-network

networks:
  sideon-network:
    driver: bridge
