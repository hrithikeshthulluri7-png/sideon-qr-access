<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDEON — Admin Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    background: #141414;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    margin: 24px;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 32px;
    letter-spacing: -0.5px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  input:focus { border-color: rgba(255,255,255,0.3); }
  button {
    width: 100%;
    padding: 15px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg {
    font-size: 14px;
    color: #ff453a;
    text-align: center;
    min-height: 20px;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">SIDEON</div>
  <h1>Admin Login</h1>
  <form id="loginForm" onsubmit="login(event)">
    <label>Email</label>
    <input type="email" id="email" placeholder="admin@sideon.com" required autocomplete="email">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    <button type="submit" id="btn">Sign In</button>
  </form>
  <div class="error-msg" id="errMsg"></div>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3001'
    : 'https://sideon-qr-access.onrender.com';

  // Redirect if already logged in
  if (localStorage.getItem('adminToken')) {
    window.location.href = 'admin-dashboard.html';
  }

  async function login(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const errMsg = document.getElementById('errMsg');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errMsg.textContent = '';

    try {
      const res = await fetch(`${API_BASE}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminName', data.admin.name);
        window.location.href = 'admin-dashboard.html';
      } else {
        errMsg.textContent = data.error || 'Login failed.';
      }
    } catch {
      errMsg.textContent = 'Connection error. Try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
