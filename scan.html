<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SIDEON QR — Check In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --purple: #7c3aed;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      align-self: flex-start;
    }

    .logo-mark { font-size: 20px; color: var(--purple); }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: 0.08em; }
    .logo-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      background: var(--purple); color: #fff;
      padding: 2px 8px; border-radius: 4px; text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    /* Loading */
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: var(--muted); font-size: 14px; }

    /* Member card */
    .status-icon {
      font-size: 56px;
      margin-bottom: 12px;
      line-height: 1;
    }

    .member-name {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .member-id {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      font-family: monospace;
    }

    .details {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 24px;
      text-align: left;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--muted); }
    .detail-value { font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-admit {
      background: var(--green);
      color: #fff;
      margin-bottom: 12px;
    }
    .btn-admit:hover:not(:disabled) { opacity: 0.88; }

    .btn-decline {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* Result states */
    .result {
      border-radius: 12px;
      padding: 20px;
      margin-top: 0;
    }
    .result-success { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); }
    .result-error   { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.3); }
    .result-warn    { background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.3); }

    .result-icon { font-size: 40px; margin-bottom: 10px; }
    .result-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .result-sub { font-size: 13px; color: var(--muted); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <span class="logo-mark">◈</span>
    <span class="logo-text">SIDEON QR</span>
    <span class="logo-badge">Scan</span>
  </header>

  <div class="card">

    <!-- Loading state -->
    <div id="stateLoading">
      <div class="spinner"></div>
      <p class="loading-text">Verifying member…</p>
    </div>

    <!-- Member info + admit button -->
    <div id="stateMember" class="hidden">
      <div class="status-icon" id="memberIcon">👤</div>
      <div class="member-name" id="memberName">—</div>
      <div class="member-id" id="memberId">—</div>

      <div class="details">
        <div class="detail-row">
          <span class="detail-label">Email</span>
          <span class="detail-value" id="detailEmail">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Mobile</span>
          <span class="detail-value" id="detailMobile">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Agent</span>
          <span class="detail-value" id="detailAgent">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Status</span>
          <span class="detail-value" id="detailStatus">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Expires</span>
          <span class="detail-value" id="detailExpires">—</span>
        </div>
      </div>

      <button class="btn btn-admit" id="btnAdmit" onclick="admit()">Admit</button>
      <button class="btn btn-decline" onclick="decline()">Decline</button>
    </div>

    <!-- Final result state (after admit/decline) -->
    <div id="stateResult" class="hidden">
      <div class="result" id="resultBox">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-sub" id="resultSub"></div>
      </div>
    </div>

    <!-- Error state -->
    <div id="stateError" class="hidden">
      <div class="result result-error">
        <div class="result-icon">❌</div>
        <div class="result-title" id="errorTitle">Invalid QR Code</div>
        <div class="result-sub" id="errorSub">This QR code is not valid or has expired.</div>
      </div>
    </div>

  </div>

  <script>
    const API = 'https://sideon-qr-backend.onrender.com/api';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    let memberData = null;

    function show(id) {
      ['stateLoading','stateMember','stateResult','stateError'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    function fmt(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString();
    }

    async function init() {
      if (!token) {
        show('stateError');
        document.getElementById('errorTitle').textContent = 'No Token Found';
        document.getElementById('errorSub').textContent = 'This QR code does not contain a valid token.';
        return;
      }

      try {
        const res = await fetch(`${API}/verify?token=${encodeURIComponent(token)}`);
        const data = await res.json();

        if (!data.success) {
          show('stateError');
          document.getElementById('errorTitle').textContent =
            data.is_expired ? 'QR Code Expired' : 'Invalid QR Code';
          document.getElementById('errorSub').textContent =
            data.error || 'This QR code is not valid.';
          return;
        }

        memberData = data;
        const ts = data.token_status || {};
        const m = data.member || {};

        document.getElementById('memberName').textContent = m.name || data.member_id;
        document.getElementById('memberId').textContent = `ID: ${data.member_id}`;
        document.getElementById('detailEmail').textContent = m.email || '—';
        document.getElementById('detailMobile').textContent = m.mobile || '—';
        document.getElementById('detailAgent').textContent = m.agent || '—';
        document.getElementById('detailExpires').textContent = fmt(ts.expiresAt);

        if (ts.is_checked_in) {
          document.getElementById('memberIcon').textContent = '✅';
          document.getElementById('detailStatus').innerHTML = '<span class="badge badge-green">Already Checked In</span>';
          document.getElementById('btnAdmit').disabled = true;
          document.getElementById('btnAdmit').textContent = 'Already Admitted';
        } else {
          document.getElementById('memberIcon').textContent = '👤';
          document.getElementById('detailStatus').innerHTML = '<span class="badge badge-yellow">Pending</span>';
        }

        show('stateMember');
      } catch (err) {
        show('stateError');
        document.getElementById('errorSub').textContent = 'Could not reach the server. Check your connection.';
      }
    }

    async function admit() {
      document.getElementById('btnAdmit').disabled = true;
      document.getElementById('btnAdmit').textContent = 'Admitting…';

      try {
        const res = await fetch(`${API}/check-in`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        const data = await res.json();

        const box = document.getElementById('resultBox');
        if (data.success) {
          box.className = 'result result-success';
          document.getElementById('resultIcon').textContent = '✅';
          document.getElementById('resultTitle').textContent = 'Admitted!';
          const name = memberData?.member?.name || data.member_id;
          document.getElementById('resultSub').textContent = `${name} checked in at ${fmt(data.checked_in_at)}`;
        } else if (data.is_duplicate) {
          box.className = 'result result-warn';
          document.getElementById('resultIcon').textContent = '⚠️';
          document.getElementById('resultTitle').textContent = 'Already Checked In';
          document.getElementById('resultSub').textContent = 'This member was already admitted.';
        } else {
          box.className = 'result result-error';
          document.getElementById('resultIcon').textContent = '❌';
          document.getElementById('resultTitle').textContent = 'Check-In Failed';
          document.getElementById('resultSub').textContent = data.error || 'Please try again.';
        }
        show('stateResult');
      } catch (err) {
        document.getElementById('btnAdmit').disabled = false;
        document.getElementById('btnAdmit').textContent = 'Admit';
        alert('Network error. Please try again.');
      }
    }

    function decline() {
      const box = document.getElementById('resultBox');
      box.className = 'result result-error';
      document.getElementById('resultIcon').textContent = '🚫';
      document.getElementById('resultTitle').textContent = 'Entry Declined';
      const name = memberData?.member?.name || 'Member';
      document.getElementById('resultSub').textContent = `${name} was not admitted.`;
      show('stateResult');
    }

    init();
  </script>
</body>
</html>
